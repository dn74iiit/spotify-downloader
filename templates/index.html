<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="#1DB954" width="40" height="40">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.659.3 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.84.24 1.2zM20.04 9.36C15.84 6.9 9.121 6.72 5.28 7.92c-.6.18-1.2-.18-1.38-.72-.18-.6.18-1.2.72-1.38 4.32-1.32 11.64-1.08 16.44 1.74.54.3 0.72 1.02.42 1.56-.3.54-1.02.72-1.44.24z"></path>
                </svg>
                <h1>Spotify Downloader</h1>
            </div>
            <p>Download your favorite tracks and playlists directly to your PC.</p>
        </header>

        <main>
            <form id="download-form" class="glass-panel">
                <div class="input-group">
                    <input type="url" id="spotify-url" placeholder="Paste Spotify Track, Album, or Playlist URL..." required>
                </div>
                <button type="submit" id="download-btn">
                    <span class="btn-text">Download Now</span>
                    <span class="loader hidden"></span>
                </button>
            </form>

            <div id="status-container" class="status-container hidden">
                <div class="status-icon"></div>
                <p id="status-message"></p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
